name: Rust

on:
  push:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always

jobs:
  web:
    name: Web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - uses: actions/cache@v2
        with:
          path: |
            ~/.cargo
            target/
          key: wasm32-unknown-unknown-stable
          restore-keys: |
            wasm32-unknown-unknown-stable
      - uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          target: wasm32-unknown-unknown
          override: true
      - name: Build wasm
        uses: actions-rs/cargo@v1
        with:
          command: build
          args: --release --no-default-features --target wasm32-unknown-unknown
      - name: Install wasm-bindgen
        uses: actions-rs/cargo@v1
        with:
          command: install
          args: -f wasm-bindgen-cli
      - name: Bind wasm
        run: wasm-bindgen --out-dir target --target web target/wasm32-unknown-unknown/release/wordlrs.wasm
      - name: Make public
        run: |
          rm -rf public
          mkdir -p public/target
          cp ./index.html public
          cp ./target/wordlrs.js public/target/wordlrs.js
          cp -R assets public
      - name: Deploy
        uses: JamesIves/github-pages-deploy-action@3.7.1
        with:
          GITHUB_TOKEN: ${{ secrets.TOKEN }}
          BRANCH: gh-pages # The branch the action should deploy to.
          FOLDER: public # The folder the action should deploy.
          CLEAN: true # Automatically remove deleted files from the deploy branch
